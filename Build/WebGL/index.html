<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>HexWars</title>
    <style>
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #06070f; }
      /* Full-window canvas: Unity keeps the WebGL render target matched to this CSS size × devicePixelRatio
         (matchWebGLToCanvasSize is on by default), so it's sharp at any window size and in fullscreen. */
      #unity-canvas { display: block; width: 100vw; height: 100vh; }
      #unity-loading { position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%);
                       font-family: sans-serif; color: #cfd6ff; text-align: center; }
      #bar { width: 220px; height: 6px; margin: 10px auto 0; background: #1a2030; border-radius: 3px; overflow: hidden; }
      #bar > div { width: 0%; height: 100%; background: #4a72e0; transition: width 0.1s; }
    </style>
  </head>
  <body>
    <canvas id="unity-canvas" tabindex="-1"></canvas>
    <div id="unity-loading">Loading HexWars…<div id="bar"><div id="fill"></div></div></div>
    <script>
      var canvas = document.querySelector("#unity-canvas");
      var config = {
        dataUrl: "Build/WebGL.data.unityweb",
        frameworkUrl: "Build/WebGL.framework.js.unityweb",
        codeUrl: "Build/WebGL.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "HexWars",
        productVersion: "0.1.0",
      };
      var script = document.createElement("script");
      script.src = "Build/WebGL.loader.js";
      script.onload = () => {
        createUnityInstance(canvas, config, (p) => {
          document.querySelector("#fill").style.width = (100 * p) + "%";
        }).then((unityInstance) => {
          document.querySelector("#unity-loading").style.display = "none";
          // double-click toggles real fullscreen; the canvas already fills the window either way
          canvas.addEventListener("dblclick", () => unityInstance.SetFullscreen(1));
        }).catch((message) => { document.querySelector("#unity-loading").textContent = message; });
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
